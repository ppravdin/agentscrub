# Publish to PyPI when a version tag is pushed (e.g. v1.1.32).
#
# One-time PyPI setup (Trusted Publishing):
#   1. PyPI → Your project → Publishing → Add GitHub Actions publisher
#      Owner: ppravdin, Repo: agentscrub, Workflow: release.yml
#   2. (Optional) GitHub repo → Settings → Environments → "pypi" with protection
#
# Release:
#   1. Bump version in pyproject.toml and src/agentscrub/__init__.py
#   2. git tag v1.1.32 && git push origin v1.1.32

name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PY=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          INIT=$(python -c "import pathlib; v=[l for l in pathlib.Path('src/agentscrub/__init__.py').read_text().splitlines() if l.startswith('__version__')][0]; print(v.split('=')[1].strip().strip('\"'))")
          test "$TAG" = "$PY" || { echo "tag v$TAG != pyproject $PY"; exit 1; }
          test "$TAG" = "$INIT" || { echo "tag v$TAG != __init__ $INIT"; exit 1; }

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/agentscrub/
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
