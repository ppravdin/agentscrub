[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "agentscrub"
version = "1.1.2"
description = "Scrub secrets and credentials from AI coding assistant session logs"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
keywords = ["security", "privacy", "ai", "claude", "codex", "cursor", "redact", "secrets"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Security",
    "Topic :: Utilities",
]
dependencies = [
    "rich>=13.0",
]

[project.urls]
Homepage   = "https://github.com/ppravdin/agentscrub"
Repository = "https://github.com/ppravdin/agentscrub"
Issues     = "https://github.com/ppravdin/agentscrub/issues"

[project.scripts]
agentscrub = "agentscrub.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
agentscrub = ["splash.txt"]
